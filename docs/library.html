<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>GameLogged - Library</title>
</head>
<body>
    <div class="header">
        <div id="toast" class="toast"></div>
        <h1>GameLogged</h1>
        <div>
            <span id="welcomeUser"></span>
            <button id="logoutBtn">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search games...">
            <button id="searchBtn">Search</button>
        </div>

        <div id="searchResults"></div>

        <h2>My Library</h2>
        <div class="filter-buttons">
            <button onclick="filterLibrary('ALL')" class="filter-btn active">All</button>
            <button onclick="filterLibrary('PLAYING')" class="filter-btn">Playing</button>
            <button onclick="filterLibrary('COMPLETED')" class="filter-btn">Completed</button>
            <button onclick="filterLibrary('DROPPED')" class="filter-btn">Dropped</button>
            <button onclick="filterLibrary('WISHLIST')" class="filter-btn">Wishlist</button>
        </div>
        <div id="library"></div>
    </div>

    <script src="config.js"></script>
    <script src="library.js"></script>
</body>
</html>
